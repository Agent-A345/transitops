<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps · Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg p-8">
        <div class="flex items-center gap-2 mb-6">
            <span class="text-amber-400 text-2xl">⚡</span>
            <h1 class="text-xl font-bold text-gray-800">TransitOps</h1>
        </div>
        <h2 class="text-xl font-bold text-gray-800 mb-1">Create your account</h2>
        <p class="text-gray-400 text-sm mb-6">Join TransitOps to manage your fleet operations</p>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">First Name</label>
                    <input type="text" name="first_name" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="John">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Last Name</label>
                    <input type="text" name="last_name" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="Doe">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Username</label>
                <input type="text" name="username" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="johndoe">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Email</label>
                <input type="email" name="email" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="john@company.com">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Role</label>
                <select name="role" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
                    <option value="fleet_manager">Fleet Manager – Full access</option>
                    <option value="dispatcher" selected>Dispatcher – Trips & dispatch</option>
                    <option value="safety_officer">Safety Officer – Driver compliance</option>
                    <option value="financial_analyst">Financial Analyst – Costs & fuel</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Password</label>
                    <input type="password" name="password" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Confirm Password</label>
                    <input type="password" name="password2" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="w-full bg-amber-400 hover:bg-amber-500 text-white font-semibold py-3 rounded-xl text-sm transition">
                Create Account →
            </button>
        </form>
        <p class="text-center text-sm text-gray-400 mt-4">
            Already have an account? <a href="/accounts/login/" class="text-amber-500 font-medium hover:underline">Sign in</a>
        </p>
    </div>
</body>
</html>
