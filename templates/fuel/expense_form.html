{% extends 'base.html' %}
{% block title %}Add Expense{% endblock %}
{% block page_title %}Add Expense{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
<form method="post">{% csrf_token %}
<div class="space-y-4">
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Vehicle *</label>
<select name="vehicle" required class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
<option value="">Select vehicle...</option>
{% for v in vehicles %}<option value="{{ v.id }}">{{ v.registration_number }} – {{ v.name }}</option>{% endfor %}
</select></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Expense Type *</label>
<select name="type" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
<option value="toll">Toll</option><option value="maintenance">Maintenance</option><option value="parking">Parking</option><option value="fine">Fine</option><option value="other">Other</option>
</select></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Amount (₹) *</label>
<input type="number" name="amount" step="0.01" required class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Date *</label>
<input type="date" name="date" required class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Note</label>
<input type="text" name="note" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"></div>
</div>
<div class="flex gap-3 mt-6">
<button type="submit" class="bg-gray-700 hover:bg-gray-800 text-white px-6 py-2.5 rounded-lg text-sm font-medium">Add Expense</button>
<a href="/fuel/" class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 px-6 py-2.5 rounded-lg text-sm font-medium">Cancel</a>
</div>
</form>
</div>
{% endblock %}
