{% extends 'base.html' %}
{% block title %}Add Fuel Log{% endblock %}
{% block page_title %}Add Fuel Log{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
<form method="post">{% csrf_token %}
<div class="space-y-4">
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Vehicle *</label>
<select name="vehicle" required class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
<option value="">Select vehicle...</option>
{% for v in vehicles %}<option value="{{ v.id }}">{{ v.registration_number }} – {{ v.name }}</option>{% endfor %}
</select></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Liters *</label>
<input type="number" name="liters" step="0.01" required class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="30.5"></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Total Cost (₹) *</label>
<input type="number" name="cost" step="0.01" required class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="2700"></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Date *</label>
<input type="date" name="date" required class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Odometer at Fill (km)</label>
<input type="number" name="odometer_at_fill" step="0.1" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="12500"></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Notes</label>
<input type="text" name="notes" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"></div>
</div>
<div class="flex gap-3 mt-6">
<button type="submit" class="bg-amber-400 hover:bg-amber-500 text-white px-6 py-2.5 rounded-lg text-sm font-medium">Add Fuel Log</button>
<a href="/fuel/" class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 px-6 py-2.5 rounded-lg text-sm font-medium">Cancel</a>
</div>
</form>
</div>
{% endblock %}
