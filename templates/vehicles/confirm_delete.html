{% extends 'base.html' %}
{% block title %}Delete Vehicle{% endblock %}
{% block page_title %}Delete Vehicle{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 text-center">
<div class="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ti ti-trash text-red-500 text-2xl"></i></div>
<h3 class="text-lg font-bold text-gray-800 dark:text-white mb-2">Delete {{ vehicle.registration_number }}?</h3>
<p class="text-gray-500 text-sm mb-6">This cannot be undone.</p>
<form method="post" class="flex gap-3 justify-center">{% csrf_token %}
<button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium">Yes, Delete</button>
<a href="/vehicles/" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 text-gray-700 dark:text-gray-300 px-6 py-2.5 rounded-lg text-sm font-medium">Cancel</a>
</form>
</div>
{% endblock %}
