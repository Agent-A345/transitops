{% extends 'base.html' %}
{% block title %}Log Maintenance{% endblock %}
{% block page_title %}Log Maintenance Request{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
<form method="post">{% csrf_token %}
<div class="grid grid-cols-2 gap-4">
<div class="col-span-2"><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Vehicle *</label>
<select name="vehicle" required class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
<option value="">Select vehicle...</option>
{% for v in vehicles %}<option value="{{ v.id }}">{{ v.registration_number }} – {{ v.name }} ({{ v.status }})</option>{% endfor %}
</select></div>
<div class="col-span-2"><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Issue Description *</label>
<textarea name="issue" required rows="3" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="Describe the issue..."></textarea></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Priority *</label>
<select name="priority" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
<option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option>
</select></div>
<div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Estimated Cost (₹)</label>
<input type="number" name="cost" step="0.01" value="0" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"></div>
<div class="col-span-2"><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Technician Name</label>
<input type="text" name="technician" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" placeholder="Optional"></div>
</div>
<div class="flex gap-3 mt-6">
<button type="submit" class="bg-amber-400 hover:bg-amber-500 text-white px-6 py-2.5 rounded-lg text-sm font-medium">Submit Request</button>
<a href="/maintenance/" class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 px-6 py-2.5 rounded-lg text-sm font-medium">Cancel</a>
</div>
</form>
</div>
{% endblock %}
