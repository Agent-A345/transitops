{% extends 'base.html' %}
{% block title %}Resolve Maintenance{% endblock %}
{% block page_title %}Resolve Maintenance{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
<div class="bg-blue-50 dark:bg-blue-900/30 rounded-lg p-4 mb-5">
<p class="font-semibold text-blue-800 dark:text-blue-300 text-sm">{{ log.vehicle.registration_number }} – {{ log.vehicle.name }}</p>
<p class="text-xs text-blue-600 dark:text-blue-400 mt-1">{{ log.issue }}</p>
</div>
<form method="post">{% csrf_token %}
<div class="mb-4"><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Final Cost (₹)</label>
<input type="number" name="cost" step="0.01" value="{{ log.cost }}" class="w-full border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"></div>
<div class="flex gap-3">
<button type="submit" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2.5 rounded-lg text-sm font-medium">✅ Mark Resolved</button>
<a href="/maintenance/{{ log.id }}/" class="flex-1 text-center bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 py-2.5 rounded-lg text-sm font-medium">Cancel</a>
</div>
</form>
</div>
{% endblock %}
